// ── Sheet date parser: handles yyyy-MM-dd, dd-MMM-yyyy, numeric serials, Date objects ──
function parseSheetDate(v) {
  if (!v && v !== 0) return "";
  // Numeric serial (Google Sheets epoch = 30-Dec-1899, same as Excel)
  if (typeof v === "number") {
    if (v < 2) return ""; // 0 or 1 = empty/epoch
    const ms = (v - 25569) * 86400 * 1000;
    return new Date(ms).toISOString().slice(0, 10);
  }
  const s = String(v).trim();
  if (!s || s === "0") return "";
  // Already yyyy-MM-dd
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // dd-MMM-yyyy  e.g. "17-May-2026"
  const mmap = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  const m1 = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (m1) { const mon = mmap[m1[2]]; if (mon) return m1[3]+"-"+mon+"-"+m1[1].padStart(2,"0"); }
  // dd/MM/yyyy or MM/dd/yyyy
  const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m2) return m2[3]+"-"+m2[2].padStart(2,"0")+"-"+m2[1].padStart(2,"0");
  // Fallback: native parse
  const d = new Date(s);
  if (!isNaN(d.getTime()) && d.getFullYear() >= 1900) return d.toISOString().slice(0, 10);
  return "";
}

// Grade is manually assigned per (yarnType + mill) pair.

// ── YARN TYPE DETECTION ──
// Returns {type:"count"|"denier", value:number, ply:number, denier:number}
// Cotton count yarns: "40s", "2/40s", "2/40s Cotton TFO" -> type:"count"
// Polyester/denier yarns: "150d", "150D", "80d single", "150d roto" -> type:"denier"
function parseYarnSpec(yarnName){
  if(!yarnName)return{type:"count",value:0,ply:1,denier:0,label:""};
  const n=yarnName.trim();

  // Denier detection: number followed by 'd' or 'D' (optionally with descriptor like "roto","single","dty","fdy","poy")
  const denierM=n.match(/^(\d+(?:\.\d+)?)\s*[dD]\b/);
  if(denierM){
    const d=+denierM[1];
    return{type:"denier",value:d,ply:1,denier:d,label:d+"D"};
  }

  // Doubled cotton count: "2/40s", "2/60s", "3/40s" etc.
  const doubledM=n.match(/^(\d+)\/(\d+)\s*[sS]?\b/);
  if(doubledM){
    const ply=+doubledM[1],cnt=+doubledM[2];
    // Effective count for doubled yarn = single count / ply
    // But for consumption formula, warp/weft uses actual count (each strand)
    // Denier equivalent = 5315 / count  (Ne to denier, corrected factor)
    // For ply yarn: effective denier = ply x (5315/count)
    const effDenier=ply*(5315/cnt);
    return{type:"count",value:cnt,ply,denier:effDenier,label:ply+"/"+cnt+"s ("+ply+"ply, "+cnt+"s each)"};
  }

  // Single cotton count: "40s", "40s Cotton", "80s", "30s Cotton TFO"
  const singleM=n.match(/^(\d+(?:\.\d+)?)\s*[sS]?\b/);
  if(singleM){
    const cnt=+singleM[1];
    const effDenier=5315/cnt;
    return{type:"count",value:cnt,ply:1,denier:effDenier,label:cnt+"s"};
  }

  return{type:"count",value:0,ply:1,denier:0,label:""};
}

// Backward-compatible count extractor (used in older calc paths)
function extractCount(yarnName){
  const spec=parseYarnSpec(yarnName);
  if(spec.type==="count")return spec.value;
  return 0; // denier yarns handled separately
}

// ── CONSUMPTION FORMULAS ──
// Cotton count yarn (Ne system):
//   Warp Kg = (Ends x Meters) / (Count x 1693.6)
//   For doubled yarn (2/40s): use single count (40) — formula stays same per strand,
//   but ply is accounted for by denier-based path below for accuracy.
//
// Denier yarn (polyester / filament):
//   Warp Kg = (Denier x Ends x Meters) / (9000 x 1000)
//   Weft Kg = (Denier x ReedSpace" x Pick x Meters) / (9000 x 1000)
//
// For doubled cotton we convert to denier for uniform calculation:
//   effDenier = ply x (5905 / count)
//   then use denier formula

function calcWarpKgByDenier(denier,ends,meters){
  if(!denier||!ends||!meters)return 0;
  return(denier*+ends*+meters)/(9000*1000);
}
function calcWeftKgByDenier(denier,reedSpaceIn,pick,meters){
  if(!denier||!reedSpaceIn||!pick||!meters)return 0;
  return(denier*+reedSpaceIn*+pick*+meters)/(9000*1000);
}

// Denier override lookup — if Masters has a manual override for this yarn, use it
function getEffDenier(yarnName,M){
  const ovr=M&&(M.yarnDenierOverride||{})[yarnName];
  if(ovr&&+ovr>0)return+ovr;
  return parseYarnSpec(yarnName).denier;
}
// Unified warp/weft calc with optional M for denier override
function calcWarpKgUnified(yarnName,ends,meters,M){
  const spec=parseYarnSpec(yarnName);
  if(!ends||!meters)return 0;
  const ovr=M&&(M.yarnDenierOverride||{})[yarnName];
  if(ovr&&+ovr>0)return calcWarpKgByDenier(+ovr,ends,meters);
  if(spec.type==="denier"||spec.ply>1){
    return calcWarpKgByDenier(spec.denier,ends,meters);
  }
  if(!spec.value)return 0;
  return(+ends*+meters)/(spec.value*1693.6);
}
function calcWeftKgUnified(yarnName,reedSpaceIn,pick,meters,M){
  const spec=parseYarnSpec(yarnName);
  if(!reedSpaceIn||!pick||!meters)return 0;
  const ovr=M&&(M.yarnDenierOverride||{})[yarnName];
  if(ovr&&+ovr>0)return calcWeftKgByDenier(+ovr,reedSpaceIn,pick,meters);
  if(spec.type==="denier"||spec.ply>1){
    return calcWeftKgByDenier(spec.denier,reedSpaceIn,pick,meters);
  }
  if(!spec.value)return 0;
  return(+reedSpaceIn*+pick*+meters)/(spec.value*1693.6);
}

// Yarn spec label for UI display
function yarnSpecBadge(yarnName){
  const spec=parseYarnSpec(yarnName);
  if(!spec.value&&!spec.denier)return null;
  if(spec.type==="denier")return spec.denier+"D polyester";
  if(spec.ply>1)return spec.ply+"/"+spec.value+"s . "+Math.round(spec.denier)+"D equiv";
  return spec.value+"s count . "+Math.round(spec.denier)+"D equiv";
}

// Legacy wrappers (kept for any existing calls)
function calcWarpKg(count,ends,meters){
  if(!count||!ends||!meters)return 0;
  return(+ends*+meters)/(count*1693.6);
}
function calcWeftKg(count,reedSpaceIn,pick,meters){
  if(!count||!reedSpaceIn||!pick||!meters)return 0;
  return(+reedSpaceIn*+pick*+meters)/(count*1693.6);
}

function PTrf({firm,M,parties,trf,pBal,yBal,toast2,updM,fname}){
  const[editId,setEditId]=useState(null);
  const startEdit=(r)=>{setEditId(r._id);sf({date:r.date||today(),yarnType:r.yarnType||"",fromParty:r.fromParty||"",toParty:r.toParty||"",qty:r.qty||"",remarks:r.remarks||""})};
  const cancelEdit=()=>{setEditId(null);sf(ini)};
  const pn=parties.map(p=>p.name);
  const ini={date:today(),yarnType:"",fromParty:"",toParty:"",qty:"",remarks:""};
  const[f,sf]=useState(ini),s=(k,v)=>sf(p=>({...p,[k]:v}));

  // Yarns held by fromParty with qty (for yarn dropdown)
  const partyYarnMap=f.fromParty?{}:null;
  if(partyYarnMap){const py=(pBal[f.fromParty]||{});Object.entries(py).forEach(([yt,q])=>{partyYarnMap[yt]=(q||0)+(yt===f.yarnType&&editId?origQtyTrf:0);});}
  const availYarnsTrf=partyYarnMap
    ?Object.entries(partyYarnMap).filter(([yt,q])=>q>0||yt===f.yarnType).sort(([,a],[,b])=>b-a).map(([yt,q])=>({value:yt,label:yt+" ("+fmt(q)+" Kg)"}))
    :M.yarnTypes.map(y=>({value:y,label:y}));

  // Live balance check for fromParty
  // Detect own-locations: same name in godowns AND any party source
  const partyNames2=new Set([...(M.weavers||[]),...(M.sizers||[]),...parties.map(p=>p.name)]);
  const sharedNamesT=new Set((M.godowns||[]).filter(g=>partyNames2.has(g)));
  const isOwnLoc=f.fromParty&&sharedNamesT.has(f.fromParty);
  // Party-held qty (issued to them minus transfers out)
  const fromBal=f.fromParty&&f.yarnType?(pBal[f.fromParty]||{})[f.yarnType]||0:null;
  // Godown (un-issued) qty for same-name entity
  const fromGdBal=isOwnLoc&&f.yarnType?(yBal[f.yarnType+"||"+f.fromParty]||0):0;
  const origQtyTrf=editId?+(trf.find(r=>r._id===editId)?.qty||0):0;
  const fromBalForEdit=fromBal!=null?(fromBal+(editId?origQtyTrf:0)):null;
  const afterTrf=fromBalForEdit!=null&&f.qty!==""?(fromBalForEdit-(+f.qty||0)):null;

  async function sub(){
    if(!f.yarnType||!f.fromParty||!f.toParty||!f.qty){toast2("Fill required fields","err");return}
    if(!editId&&f.fromParty===f.toParty){toast2("From and To cannot be same","err");return}
    // Negative balance guard
    const partyHas=fromBalForEdit!=null?fromBalForEdit:0;
    if(+f.qty>partyHas){toast2("❌ Insufficient yarn with "+f.fromParty+"! They hold "+fmt(partyHas)+" Kg","err");return}
    if(editId){await dbUpdate(firm,"transfers",editId,{...f,qty:+f.qty});setEditId(null);}
    else{await dbs(firm,"transfers",uid(),{...f,qty:+f.qty});}
    sf(ini);toast2(editId?"Updated!":"Saved!")
  }
  async function del(id){if(!confirm("Move to history?"))return;await dbd(firm,"transfers",id)}
  return h("div",null,
    h("div",{className:"card"},
      editId&&h("div",{className:"edit-bar"},"✏️ Editing transfer — ",h("button",{className:"btn btn-sm",style:{marginLeft:"auto"},onClick:cancelEdit},"Cancel")),
      h("div",{className:"ct",style:{marginBottom:10}},editId?"Update transfer":"Yarn transfer between weavers / sizers"),
      h("div",{className:"fr c2"},FL("Date",h("input",{type:"date",value:f.date,onChange:e=>s("date",e.target.value)})),FL("Remarks",h("input",{value:f.remarks,onChange:e=>s("remarks",e.target.value)}))),

  const fabCancel=()=>{setFabEditId(null);setFabF(fabIni);setShowFabForm(false);};
  async function fabSub(){
    if(!fabF.designNo||!fabF.meters){toast2("Design No and Meters are required","err");return}
    const save={...fabF,meters:+fabF.meters,weight:+fabF.weight||0,pick:+fabF.pick||0};
    if(fabEditId){await dbUpdate(firm,"fabric",fabEditId,save);setFabEditId(null);}
    else{await dbs(firm,"fabric",uid(),save);}
    setFabF(fabIni);setShowFabForm(false);toast2(fabEditId?"Updated!":"Fabric added to stock!");
  }
  async function fabDel(id){if(!confirm("Delete this fabric entry?"))return;await dbd(firm,"fabric",id);}

  // ── Detect names that appear in BOTH godowns AND parties (same physical place) ──
  // Use BOTH Masters arrays AND Firestore parties collection to catch all registrations
  const partyNames=new Set([
    ...(M.weavers||[]),...(M.sizers||[]),
    ...parties.map(p=>p.name)   // Firestore parties (may differ from Masters arrays)
  ]);
  const sharedNames=new Set((M.godowns||[]).filter(g=>partyNames.has(g)));

  // ── Raw rows ──
  const godownRows=Object.entries(yBal)
    .map(([k,v])=>{const[yt,gd]=k.split("||");return{yt,gd,q:v};})
    .filter(e=>(!fy||e.yt===fy)&&(!fg||e.gd===fg));

  const partyRowsRaw=Object.entries(pBal)
    .flatMap(([party,yarns])=>Object.entries(yarns).map(([yt,q])=>({party,yt,q})))
    .filter(e=>(!fy||e.yt===fy)&&e.q!==0);

  // In the "Party" tab, exclude shared-name parties (they are shown in Godown as combined)
  const partyRowsExternal=partyRowsRaw.filter(e=>!sharedNames.has(e.party));

  // ── LOCATION VIEW — merge same-name godown+party into one balance ──
  // Build: locationName -> yarnType -> combined qty
  const locMap={};
  // Step 1: godown balances
  Object.entries(yBal).forEach(([k,v])=>{
    const[yt,gd]=k.split("||");
    if(!locMap[gd])locMap[gd]={isOwn:sharedNames.has(gd),isGodown:true,isParty:partyNames.has(gd),yarns:{}};
    locMap[gd].yarns[yt]=(locMap[gd].yarns[yt]||0)+v;
  });
  // Step 2: party balances — merge shared into existing godown entry, create new for pure parties
  Object.entries(pBal).forEach(([party,yarns])=>{
    if(!locMap[party])locMap[party]={isOwn:false,isGodown:false,isParty:true,yarns:{}};
    Object.entries(yarns).forEach(([yt,q])=>{
      locMap[party].yarns[yt]=(locMap[party].yarns[yt]||0)+q;
    });
    locMap[party].isParty=true;
    if(sharedNames.has(party)){locMap[party].isOwn=true;locMap[party].isGodown=true;}
  });
  const locRows=Object.entries(locMap).flatMap(([loc,info])=>
    Object.entries(info.yarns)
      .filter(([yt,q])=>q!==0&&(!fy||yt===fy))

  );

  // ── Summary by yarn type ──

  godownRows.forEach(e=>{if(!yarnSummary[e.yt])yarnSummary[e.yt]={godown:0,party:0,inward:0};yarnSummary[e.yt].godown+=e.q;});
  partyRowsRaw.forEach(e=>{if(!yarnSummary[e.yt])yarnSummary[e.yt]={godown:0,party:0,inward:0};yarnSummary[e.yt].party+=e.q;});

  const partyTotal=partyRowsRaw.reduce((a,e)=>a+e.q,0);
  const grandTotal=gdTotal+partyTotal;
  const gdVal=godownRows.reduce((a,e)=>a+e.q*((M.yarnRates||{})[e.yt]||0),0);
  const locTotal=locRows.reduce((a,e)=>a+e.q,0);

    sharedNames.size>0&&h("div",{className:"ac wn",style:{marginBottom:12}},

      h("div",null,
        h("div",{className:"ac-t"},"Integrated locations detected"),

    ),
    h("div",{className:"card"},
      h("div",{className:"chd",style:{marginBottom:12}},
        h("div",{className:"ct"},"Stock Ledger"),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          h("div",{className:"fsw"},viewBtns.map(b=>h("button",{key:b.id,className:"fb"+(view===b.id?" r":""),onClick:()=>setView(b.id)},b.l))),
          h("button",{className:"btn btn-sm btn-xl no-print",onClick:()=>{

            else if(view==="godown")csvDL("godown-stock",["Yarn","Godown","Balance Kg","Rate","Value"],godownRows.map(e=>{const rt=(M.yarnRates||{})[e.yt]||0;return[e.yt,e.gd,e.q,rt,e.q*rt];}));

// ── PERFORMANCE ──
function PRep({M,iss,fab,pBal,fname}){
  const[per,setPer]=useState("all");
  const now=new Date();
  const inP=(d)=>{if(per==="all")return true;const dt=new Date(d);if(per==="mo")return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();return(now-dt)<90*864e5};
  const stats=M.weavers.map(w=>{
    const iKg=iss.filter(r=>r.issuedTo===w&&inP(r.date)).reduce((a,r)=>a+(+r.qty||0),0);
    const fM=fab.filter(r=>r.weaver===w&&inP(r.date)).reduce((a,r)=>a+(+r.meters||0),0);
    const fKg=fab.filter(r=>r.weaver===w&&inP(r.date)).reduce((a,r)=>a+(+r.weight||0),0);
    const hKg=Object.values(pBal[w]||{}).reduce((a,v)=>a+v,0);
    const wKg=iKg>0?Math.max(0,iKg-fKg-hKg):0;
    const wPct=iKg>0?((wKg/iKg)*100).toFixed(1):"0";
    const mPk=iKg>0?(fM/iKg).toFixed(2):"0";
    return{w,iKg,fM,fKg,hKg,wKg,wPct,mPk};
  }).filter(s=>s.iKg>0||s.fM>0);
  return h("div",{className:"card"},
    h("div",{className:"chd"},h("div",{className:"ct"},"Weaver performance report"),
      h("div",{style:{display:"flex",gap:8}},
        h("select",{value:per,onChange:e=>setPer(e.target.value),style:{height:30,fontSize:12}},h("option",{value:"all"},"All time"),h("option",{value:"mo"},"This month"),h("option",{value:"3m"},"Last 3 months")),
        h("button",{className:"btn btn-sm btn-xl no-print",onClick:()=>csvDL("performance",["Weaver","Issued Kg","Fabric m","Fabric Kg","Held Kg","Wastage Kg","Waste %","m/Kg"],stats.map(s=>[s.w,s.iKg,s.fM,s.fKg,s.hKg,s.wKg,s.wPct,s.mPk]))},"⬇ Excel")
      )
    ),
    stats.length===0?Em("No data yet. Issue yarn and record fabric to see performance."):
    stats.map(s=>h("div",{key:s.w,className:"rc"},
      h("div",{className:"rc-n"},h("span",null,s.w),h("span",{className:"bdg "+(+s.wPct<5?"bo":+s.wPct<10?"bw":"be")},s.wPct+"% waste")),
      h("div",{className:"g2"},
        h("div",null,
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Yarn issued"),h("span",{className:"mn fw5"},fmt(s.iKg)+" Kg")),
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Fabric received"),h("span",{className:"mn fw5"},fmt(s.fM)+" m")),
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Fabric weight"),h("span",{className:"mn"},fmt(s.fKg)+" Kg"))
        ),
        h("div",null,
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Still held"),h("span",{className:"mn"},fmt(s.hKg)+" Kg")),
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Wastage"),h("span",{className:+s.wPct>10?"ln":"mn"},fmt(s.wKg)+" Kg")),
          h("div",{className:"rc-r"},h("span",{className:"rc-l"},"Efficiency"),h("span",{className:"mn fw5"},s.mPk+" m/Kg"))
        )
      )
    ))
  );
}

    if(fy&&r.yarnType!==fy)return false;
    if(fd1&&r.date<fd1)return false;

  });
  const millMap={};
  filt.forEach(r=>{
    const mill=r.mill||"(No mill — update entry)";

    if(!millMap[mill])millMap[mill]={totalKg:0,totalVal:0,yarns:{},suppliers:{}};

    const val=(+r.ratePerKg||0)*(+r.totalKg||0);
    millMap[mill].totalVal+=val;
    if(!millMap[mill].yarns[r.yarnType])millMap[mill].yarns[r.yarnType]={kg:0,val:0,entries:[]};
    millMap[mill].yarns[r.yarnType].kg+=(+r.totalKg||0);
    millMap[mill].yarns[r.yarnType].val+=val;
    millMap[mill].yarns[r.yarnType].entries.push(r);
    if(!millMap[mill].suppliers[sup])millMap[mill].suppliers[sup]={kg:0};
    millMap[mill].suppliers[sup].kg+=(+r.totalKg||0);
  });
  const grandKg=filt.reduce((a,r)=>a+(+r.totalKg||0),0);
  const grandVal=filt.reduce((a,r)=>a+((+r.ratePerKg||0)*(+r.totalKg||0)),0);
  const grandAvg=grandKg>0?grandVal/grandKg:0;

        FL("Yarn type",FS(fy,v=>setFy(v),M.yarnTypes))
      ),
      h("div",{className:"fr c2"},
        FL("Supplier / Trader",h("select",{value:selSup,onChange:e=>setSelSup(e.target.value)},h("option",{value:""},"All suppliers"),suppliers.map(s=>h("option",{key:s,value:s},s)))),
        FL("Date range",h("div",{style:{display:"flex",gap:4,alignItems:"center"}},h("input",{type:"date",value:fd1,onChange:e=>setFd1(e.target.value),style:{flex:1}}),h("span",{style:{color:"var(--mu)"}},"-"),h("input",{type:"date",value:fd2,onChange:e=>setFd2(e.target.value),style:{flex:1}})))
      ),
      grandKg>0&&h("div",{style:{display:"flex",gap:10,flexWrap:"wrap",marginTop:4}},
        h("span",{className:"bdg ba mn"},fmt(grandKg)+" Kg total"),
        grandVal>0&&h("span",{className:"bdg bo mn"},"\u20b9"+fmt(grandVal)+" total"),
        grandAvg>0&&h("span",{className:"bdg bw mn"},"avg \u20b9"+fmt(grandAvg.toFixed(0))+"/Kg"),
        h("button",{className:"btn btn-sm btn-xl no-print",style:{marginLeft:"auto"},onClick:()=>csvDL("yarn-mill-ledger",["Mill","Date","Yarn","Supplier","Destination","Lot","Kg","Rate/Kg","Value"],filt.map(r=>{const dest=r.destination||r.godown;const val=(+r.ratePerKg||0)*(+r.totalKg||0);return[r.mill||"",fmtD(r.date),r.yarnType,r.supplier||"",dest,r.lotNo||"",r.totalKg,r.ratePerKg||"",val||""]}))},"\u2b07 Excel")
      )
    ),
    Object.entries(millMap).sort(([a],[b])=>a.localeCompare(b)).map(([mill,data])=>{
      const avg=data.totalKg>0?data.totalVal/data.totalKg:0;
      const isMissing=mill.startsWith("(No mill");
      return h("div",{key:mill,className:"card",style:{marginBottom:12,borderLeft:isMissing?"4px solid var(--wn)":"4px solid var(--acc)"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10,paddingBottom:8,borderBottom:"2px solid var(--bdl)"}},
          h("div",{style:{flex:1}},
            h("div",{style:{fontWeight:700,fontSize:16,display:"flex",alignItems:"center",gap:6}},
              h("span",null,"\ud83c\udff7"),h("span",null,mill),
              isMissing&&h("span",{className:"bdg be",style:{fontSize:9}},"Missing")
            ),
            Object.keys(data.suppliers).length>0&&h("div",{style:{fontSize:11,color:"var(--mu)",marginTop:3}},
              "Traders: "+Object.entries(data.suppliers).map(([s,d])=>s+" ("+fmt(d.kg)+" Kg)").join(" \u00b7 ")
            )
          ),
          h("div",{style:{textAlign:"right"}},
            h("div",{className:"mn fw5",style:{fontSize:17}},fmt(data.totalKg)+" Kg"),
            data.totalVal>0&&h("div",{style:{fontSize:12,color:"var(--ok)"}},"\u20b9"+fmt(data.totalVal)),
            avg>0&&h("div",{className:"tm",style:{fontSize:11}},"avg \u20b9"+fmt(avg.toFixed(0))+"/Kg")
          )
        ),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}},
          Object.entries(data.yarns).map(([yt,d])=>{
            const yAvg=d.kg>0?d.val/d.kg:0;
            return h("div",{key:yt,style:{background:"var(--bg)",border:"1px solid var(--bdl)",borderRadius:"var(--r)",padding:"5px 10px",fontSize:11}},
              h("span",{className:"bdg bi",style:{fontSize:9,marginRight:4}},yt),
              h("span",{className:"mn"},fmt(d.kg)+" Kg"),
              yAvg>0&&h("span",{className:"tm",style:{marginLeft:5}},"\u20b9"+fmt(yAvg.toFixed(0))+"/Kg"),
              d.val>0&&h("span",{className:"tm",style:{marginLeft:4}},"\u2022 \u20b9"+fmt(d.val))
            );
          })

        h("div",{className:"tw"},h("table",null,
          h("thead",null,h("tr",null,TH(["Date","Yarn","Supplier","Received at","Lot","Kg","Rate/Kg","Value \u20b9"]))),
          h("tbody",null,
            Object.values(data.yarns).flatMap(d=>d.entries).sort((a,b)=>a.date.localeCompare(b.date)).map((r,i)=>{
              const dest=r.destination||r.godown;const val=(+r.ratePerKg||0)*(+r.totalKg||0);
              return h("tr",{key:i},
                Td(h("span",{className:"mn tm",style:{fontSize:11}},fmtD(r.date))),
                Td(h("span",{className:"bdg bi"},r.yarnType)),
                Td(r.supplier||"—","mn"),
                h("td",null,h("div",{style:{display:"flex",gap:4}},h("span",null,dest),h("span",{className:"bdg "+(r.destType==="party"?"bo":"bw"),style:{fontSize:9}},r.destType==="party"?"\ud83d\udc64":"\ud83c\udfe0"))),
                Td(r.lotNo||"—"),
                Td(h("span",{className:"mn fw5"},fmt(r.totalKg)+" Kg")),
                Td(r.ratePerKg?"\u20b9"+fmt(r.ratePerKg):"—","mn"),
                Td(val?"\u20b9"+fmt(val):"—","mn")
              );
            }),
            h("tr",{style:{background:"var(--bg)",fontWeight:600}},
              h("td",{colSpan:5,style:{fontSize:12,padding:"6px 10px"}},"Total from "+mill),
              Td(h("span",{className:"lp"},fmt(data.totalKg)+" Kg")),
              Td(avg>0?"\u20b9"+fmt(avg.toFixed(0))+" avg":"—","mn"),
              Td(data.totalVal?"\u20b9"+fmt(data.totalVal):"—","mn lp")
            )
          )
        ))
      );
    }),
    Object.keys(millMap).length===0&&Em("No inward entries match your filters.")
  );
}

// ── Google Script URL Editor (persistent via localStorage) ──
function GsUrlEditor(){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(()=>localStorage.getItem("tsm_gs_url")||"");
  const[saved,setSaved]=useState(false);
  const current=getGsUrl();
  const isCustom=!!localStorage.getItem("tsm_gs_url");

  function save(){
    const url=val.trim();
    if(!url.includes("script.google.com")){alert("Paste a valid Google Apps Script URL");return;}
    localStorage.setItem("tsm_gs_url",url);
    window._gsInfo=null; // clear cache so banner re-fetches
    setSaved(true);setEditing(false);
    setTimeout(()=>setSaved(false),3000);
    location.reload(); // reload so all components use new URL
  }
  function reset(){
    localStorage.removeItem("tsm_gs_url");
    window._gsInfo=null;
    setVal("");setEditing(false);
    location.reload();
  }

  if(editing) return h("div",{style:{padding:"8px 10px",background:"#FFF8E1",border:"1px solid #FFD54F",borderRadius:"var(--r)",marginBottom:8}},
    h("div",{style:{fontSize:11,fontWeight:600,color:"#F57F17",marginBottom:6}},"🔗 Paste your Google Apps Script deployment URL:"),
    h("div",{style:{display:"flex",gap:6}},
      h("input",{value:val,onChange:e=>setVal(e.target.value),
        placeholder:"https://script.google.com/macros/s/AKfycb.../exec",
        style:{flex:1,height:30,fontSize:11,fontFamily:"monospace"}}),
      h("button",{className:"btn btn-p btn-sm",onClick:save},"✓ Save"),
      h("button",{className:"btn btn-sm",onClick:()=>setEditing(false)},"Cancel")
    ),
    h("div",{style:{fontSize:10,color:"var(--mu)",marginTop:4}},"Get URL: Apps Script → Deploy → Manage deployments → copy URL")
  );

  return h("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:"var(--bg)",borderRadius:"var(--r)",marginBottom:6,fontSize:11}},
    h("span",{style:{color:"var(--mu)"}},"🔗 Script URL:"),
    h("span",{style:{fontFamily:"monospace",fontSize:10,color:"var(--mu)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
      current.replace("https://script.google.com/macros/s/","…/").replace("/exec","")),
    saved&&h("span",{style:{color:"var(--ok)",fontSize:11}},"✅ Saved"),
    h("button",{className:"btn btn-sm",style:{fontSize:10},onClick:()=>{setVal(current);setEditing(true);}},isCustom?"✏ Change URL":"✏ Update URL"),
    isCustom&&h("button",{className:"btn btn-sm",style:{fontSize:10,color:"var(--er)"},onClick:reset},"Reset")
  );
}

// ── FABRIC DISPATCH ──────────────────────────────────────────
function PDisp({firm,M,disp,fab,toast2,updM,fname}){
  const[f,sf]=useState({date:today(),challanNo:"",customer:"",designNo:"",meters:"",taka:"",rate:"",deliveryPlace:"",transporter:"",discountPct:"",lotNo:"",remarks:""});
  const s=(k,v)=>sf(p=>({...p,[k]:v}));
  const[editId,setEditId]=useState(null);
  const[srch,setSrch]=useState("");
  const[fc,setFc]=useState("");
  const[sheetInfo,setSheetInfo]=useState(null);
  const[sheetErr,setSheetErr]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[selEntry,setSelEntry]=useState(null); // _id of entry with open payment panel
  const[pmtForm,setPmtForm]=useState({date:today(),amount:"",note:""});
  const pfSet=(k,v)=>setPmtForm(p=>({...p,[k]:v}));
  const[impOpen,setImpOpen]=useState(false);
  const[impRows,setImpRows]=useState([]);
  const[impCols,setImpCols]=useState([]);
  const[colMap,setColMap]=useState({});
  const[impSel,setImpSel]=useState({});
  const[importing,setImporting]=useState(false);
  const impRef=React.useRef();

  const FIELDS=[{k:"date",l:"Date"},{k:"challanNo",l:"Challan"},{k:"customer",l:"Customer"},
    {k:"designNo",l:"Design"},{k:"meters",l:"Meters"},{k:"taka",l:"Taka"},
    {k:"rate",l:"Rate"},{k:"deliveryPlace",l:"Delivery"},{k:"transporter",l:"Transporter"},
    {k:"discountPct",l:"Discount %"},{k:"remarks",l:"Remarks"}];

  const ini={date:today(),challanNo:"",customer:"",designNo:"",meters:"",taka:"",rate:"",deliveryPlace:"",transporter:"",discountPct:"",lotNo:"",remarks:""};

  function calcPmt(rcvd,tot){
    const r=+rcvd||0,t=+tot||0;
    if(r<=0)return "Pending";
    if(t>0&&r>t*1.001)return "Excess";
    if(t>0&&r>=t*0.999)return "Received";
    return "Partial";
  }

  useEffect(()=>{
    if(window._gsInfo&&window._gsInfo._url===getGsUrl()){setSheetInfo(window._gsInfo);return;}
    fetch(getGsUrl()).then(r=>r.json())
      .then(d=>{if(d.ok&&d.url){setSheetInfo(d);window._gsInfo={...d,_url:getGsUrl()};}else setSheetErr(true);})
      .catch(()=>setSheetErr(true));
  },[]);

  // ── Auto-sync: pull sheet data every 30 s (uses ref to avoid stale-closure/infinite-loop) ──
  const dispRef=React.useRef(disp);
  useEffect(()=>{dispRef.current=disp;},[disp]);

  useEffect(()=>{
    let active=true;
    const pull=async()=>{
      try{
        // Fetch entries (amounts + instalments)
        const res=await fetch(getGsUrl()+"?action=data&firm="+encodeURIComponent(FIRMS[firm].name));
        const j=await res.json();
        if(!j.ok||!active)return;
        const currentDisp=dispRef.current;
        for(const se of j.entries||[]){
          const ex=currentDisp.find(d=>d.challanNo&&String(d.challanNo)===String(se.challan));
          if(!ex)continue;
          const shRcvd=+se.amtRcvd||0;
          const appRcvd=+ex.amountReceived||0;
          // Build payments from sheet instalment columns using robust date parser
          const shPmts=[];
          for(let i=1;i<=5;i++){
            const dt=se["i"+i+"date"],amt=+se["i"+i+"amt"]||0;
            if(amt>0){
              const parsedDate=parseSheetDate(dt)||today();
              shPmts.push({id:"sh_"+se.challan+"_"+i,date:parsedDate,amount:amt,note:"From Sheet"});
            }
          }
          // Also fetch payment ledger for this challan to get accurate instalment history
          const appPmts=ex.payments||[];
          // Detect real changes: amount or instalment count differs
          const rcvdChanged=Math.abs(shRcvd-appRcvd)>0.01;
          const pmtsChanged=shPmts.length>0&&shPmts.length!==appPmts.length;
          // Check if sheet instalment amounts differ from app
          const amtsChanged=shPmts.length>0&&shPmts.some((sp,idx)=>{
            const ap=appPmts[idx];return !ap||Math.abs((+ap.amount||0)-(+sp.amount||0))>0.01;
          });
          if((rcvdChanged||pmtsChanged||amtsChanged)&&active){
            await dbUpdate(firm,"dispatch",ex._id,{...ex,
              amountReceived:shRcvd,
              paymentStatus:calcPmt(shRcvd,ex.total),
              payments:shPmts.length>0?shPmts:appPmts
            });
          }
        }
      }catch(e){console.warn("Sheet sync error:",e.message);}
    };
    pull();
    const id=setInterval(pull,30000); // every 30 s — 10 s was too aggressive
    return()=>{active=false;clearInterval(id);};
  },[firm]); // ← only re-run when firm changes, NOT when disp changes

  function startEdit(r){
    setEditId(r._id);
    // Normalize delivery to avoid repeated concatenation
    const rawDp=r.deliveryPlace||r.delivery||"";
    const rawTp=r.transporter||"";
    let dp=rawDp, tp=rawTp;
    if(rawDp&&rawTp&&rawDp.includes(" / "+rawTp)){
      // deliveryPlace already has transporter appended — strip it
      dp=rawDp.split(" / ").filter(p=>p.trim()!==rawTp.trim()).join(" / ");
    } else if(rawDp.includes(" / ")&&!rawTp){
      // combined in one field — split it
      const parts=rawDp.split(" / ");
      dp=parts[0]; tp=parts.slice(1).join(" / ");
    }
    sf({date:r.date||today(),challanNo:r.challanNo||"",customer:r.customer||"",
      designNo:r.designNo||"",meters:r.meters||"",taka:r.taka||"",rate:r.rate||"",
      deliveryPlace:dp,transporter:tp,
      discountPct:r.discountPct||"",lotNo:r.lotNo||"",remarks:r.remarks||""});
  }
  function cancelEdit(){setEditId(null);sf(ini);}

  function cellVal(row,ci){
    if(ci==null||ci==="")return "";
    const v=row[+ci];
    if(v instanceof Date)return v.toISOString().slice(0,10);
    return String(v||"").trim();
  }

  function onExcelFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"binary",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(!data.length)return toast2("Empty file","err");
        const hdrs=data[0].map(h=>String(h||"").trim());
        const rows=data.slice(1).filter(r=>r.some(c=>c!=""));
        setImpCols(hdrs);setImpRows(rows);
        const aliases={date:["date","dt"],challanNo:["challan","invoice"],customer:["customer","buyer","party"],
          designNo:["design","quality"],meters:["meters","mtr"],taka:["taka","rolls"],
          rate:["rate","price"],deliveryPlace:["delivery"],transporter:["transport"],discountPct:["discount","disc"]};
        const auto={};
        FIELDS.forEach(({k})=>{
          const al=aliases[k]||[k];
          const idx=hdrs.findIndex(h=>al.some(a=>h.toLowerCase().includes(a)));
          if(idx>=0)auto[k]=String(idx);
        });
        setColMap(auto);
        const sel={};rows.forEach((_,i)=>{sel[i]=true;});setImpSel(sel);setImpOpen(true);
      }catch(err){toast2("Cannot read: "+err.message,"err");}
    };
    reader.readAsBinaryString(file);e.target.value="";
  }

  async function doImport(){
    setImporting(true);
    const sel=impRows.filter((_,i)=>impSel[i]);let n=0;
    for(const row of sel){
      const g=k=>cellVal(row,colMap[k]);
      const m=+g("meters")||0,rt=+g("rate")||0,tax=m*rt,disc=tax*(+g("discountPct")||0)/100;
      const ad=tax-disc,sg=ad*0.025,cg=ad*0.025,tot=ad+sg+cg;
      const rec={date:g("date")||today(),challanNo:g("challanNo"),customer:g("customer"),
        designNo:g("designNo"),meters:m,taka:+g("taka")||0,rate:rt,deliveryPlace:g("deliveryPlace"),
        transporter:g("transporter"),discountPct:+g("discountPct")||0,lotNo:"",remarks:g("remarks"),
        taxable:tax,discAmt:disc,afterDisc:ad,sgst:sg,cgst:cg,total:tot,
        payments:[],amountReceived:0,paymentStatus:"Pending"};
      if(!rec.customer&&!rec.meters)continue;
      await dbs(firm,"dispatch",uid(),rec);n++;
    }
    setImporting(false);setImpOpen(false);setImpRows([]);toast2(n+" entries imported");
  }

  async function gsPost(payload){
    try{
      const res=await fetch(GS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
      return await res.json();
    }catch(e){return {ok:false,error:e.message};}
  }

  async function saveDispatch(){
    if(!f.customer||!f.designNo||!f.meters||!f.rate){toast2("Fill required fields","err");return;}
    const taxable=(+f.meters)*(+f.rate);
    const discAmt=taxable*(+f.discountPct||0)/100;
    const afterDisc=taxable-discAmt;
    const sgst=afterDisc*0.025,cgst=afterDisc*0.025,total=afterDisc+sgst+cgst;
    const save={...f,meters:+f.meters,taka:+f.taka||0,rate:+f.rate,discountPct:+f.discountPct||0,
      taxable,discAmt,afterDisc,sgst,cgst,total};
    const isEdit=!!editId;
    if(isEdit){
      const ex=disp.find(d=>d._id===editId);
      if(ex){save.payments=ex.payments||[];save.amountReceived=ex.amountReceived||0;save.paymentStatus=calcPmt(ex.amountReceived,total);}
      await dbUpdate(firm,"dispatch",editId,save);setEditId(null);
    } else {
      save.payments=[];save.amountReceived=0;save.paymentStatus="Pending";
      await dbs(firm,"dispatch",uid(),save);
    }
    sf(ini);toast2(isEdit?"Updated!":"Saved!");
    gsPost({action:isEdit?"updateEntry":"addEntry",firm:FIRMS[firm].name,...save})
      .then(r=>r.ok?toast2("Sheet synced"):toast2("Sheet: "+(r.error||"Error"),"err"));
  }

  async function addPayment(entry){
    if(!pmtForm.amount||+pmtForm.amount<=0){toast2("Enter amount","err");return;}
    const newP={id:uid(),date:pmtForm.date||today(),amount:+pmtForm.amount,note:pmtForm.note||""};
    const pmts=[...(entry.payments||[]),newP];
    const rcvd=pmts.reduce((a,p)=>a+(+p.amount||0),0);
    const status=calcPmt(rcvd,entry.total);
    // 1. Update Firebase immediately for instant UI
    await dbUpdate(firm,"dispatch",entry._id,{...entry,payments:pmts,amountReceived:rcvd,paymentStatus:status});
    setPmtForm({date:today(),amount:"",note:""});
    toast2("Payment of ₹"+fmt(+pmtForm.amount)+" recorded");
    // 2. Sync to Google Sheet (instalments + summary)
    gsPost({action:"syncInstalments",firm:FIRMS[firm].name,challanNo:entry.challanNo,
      customer:entry.customer,designNo:entry.designNo,challanDate:entry.date,
      billTotal:entry.total,payments:pmts})
      .then(r=>{
        if(r.ok) toast2("Sheet: "+r.synced+" instalment"+(r.synced!==1?"s":"")+" synced");
        else toast2("Sheet sync: "+(r.error||"?"),"err");
      });
    gsPost({action:"updatePayment",firm:FIRMS[firm].name,challanNo:entry.challanNo,
      amountReceived:rcvd,paymentStatus:status,paymentReceived:rcvd});
  }

  async function deletePmt(entry,pmtId){
    if(!confirm("Remove this instalment?"))return;
    const pmts=(entry.payments||[]).filter(p=>p.id!==pmtId);
    const rcvd=pmts.reduce((a,p)=>a+(+p.amount||0),0);
    const status=calcPmt(rcvd,entry.total);
    await dbUpdate(firm,"dispatch",entry._id,{...entry,payments:pmts,amountReceived:rcvd,paymentStatus:status});
    toast2("Instalment removed");
    // Sync deletion to sheet
    gsPost({action:"syncInstalments",firm:FIRMS[firm].name,challanNo:entry.challanNo,
      customer:entry.customer,designNo:entry.designNo,challanDate:entry.date,
      billTotal:entry.total,payments:pmts})
      .then(r=>r.ok?toast2("Sheet updated: "+(pmts.length)+" instalment"+(pmts.length!==1?"s":"")+" remaining"):null);
    gsPost({action:"updatePayment",firm:FIRMS[firm].name,challanNo:entry.challanNo,
      amountReceived:rcvd,paymentStatus:status,paymentReceived:rcvd});
  }

  async function delEntry(id){if(!confirm("Delete this entry?"))return;await dbd(firm,"dispatch",id);setSelEntry(null);}

  async function pushAll(){
    if(!confirm("Push all "+disp.length+" entries to Google Sheet?"))return;
    setSyncing(true);toast2("Pushing…");
    const r=await gsPost({action:"pushAll",firm:FIRMS[firm].name,entries:disp.map(x=>({...x,firm:FIRMS[firm].name}))});

        const shPmts=[];

function PHist({firm,delInw,delIss,delBms,delTrf,delFab,toast2}){
  const COLS={inward:"Yarn Inward",issues:"Issue Yarn",beams:"Beam Register",transfers:"Yarn Transfer",fabric:"Fabric Received"};
  const DAY15=15*864e5;
  const now=Date.now();

  const allDel=[
    ...(delInw||[]).map(r=>({...r,_col:"inward",_label:"Inward: "+r.yarnType+" | "+fmt(r.totalKg)+"Kg | "+r.godown})),
    ...(delIss||[]).map(r=>({...r,_col:"issues",_label:"Issue: "+r.yarnType+" -> "+r.issuedTo+" | "+fmt(r.qty)+"Kg"})),
    ...(delBms||[]).map(r=>({...r,_col:"beams",_label:"Beam: "+r.beamNo+" | "+r.weaver+" | "+r.designNo})),
    ...(delTrf||[]).map(r=>({...r,_col:"transfers",_label:"Transfer: "+r.yarnType+" | "+r.fromParty+" -> "+r.toParty})),
    ...(delFab||[]).map(r=>({...r,_col:"fabric",_label:"Fabric: "+r.designNo+" | "+r.weaver+" | "+fmt(r.meters)+"m"})),
  ].filter(r=>r._deletedAt&&(now-new Date(r._deletedAt).getTime())<DAY15)
   .sort((a,b)=>new Date(b._deletedAt)-new Date(a._deletedAt));

  async function restore(r){
    await dbRestore(firm,r._col,r._id);
    toast2("Restored to "+COLS[r._col]);
  }
  async function hardDel(r){
    if(!confirm("Permanently delete? Cannot be undone."))return;
    await dbHardDel(firm,r._col,r._id);
    toast2("Permanently deleted");
  }

  const daysLeft=(dt)=>{
    const d=Math.ceil((DAY15-(now-new Date(dt).getTime()))/864e5);
    return Math.max(0,d);
  };

  return h("div",null,
    h("div",{className:"card",style:{background:"var(--inb)",border:"1px solid #BDD8ED",marginBottom:12}},
      h("div",{style:{fontSize:13,color:"var(--in)",lineHeight:1.6}},"🗑 Deleted records are kept here for 15 days. Click Restore to bring them back, or they are automatically removed after 15 days.")
    ),
    allDel.length===0?h("div",{className:"card"},h("div",{className:"empty"},h("div",{className:"ei"},"✅"),h("p",null,"No deleted records. History is clean."))):
    allDel.map((r,i)=>{
      const dl=daysLeft(r._deletedAt);
      return h("div",{key:i,className:"hcard"},
        h("div",{className:"hcard-hd"},
          h("div",null,
            h("div",{className:"hcard-t"},r._label),
            h("div",{className:"hcard-s"},COLS[r._col]+" . Deleted "+fmtD(r._deletedAt?.split("T")[0])+" . "+fmtD(r.date))
          ),
          h("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
            h("span",{className:"bdg "+(dl>5?"bo":"bw")},dl+" days left"),
            h("button",{className:"btn btn-sm btn-restore no-print",onClick:()=>restore(r)},"↩ Restore"),
            h("button",{className:"btn btn-sm btn-del no-print",onClick:()=>hardDel(r)},"Delete forever")
          )
        )
      );
    })
  );
}

// ── Helpers ──
function FL(label,child){return h("div",{className:"fld"},h("label",null,label),child)}
function FS(val,onChange,opts){return h("select",{value:val,onChange:e=>onChange(e.target.value)},h("option",{value:""},"Select..."),opts.map(o=>h("option",{key:o,value:o},o)))}
// Select with value+label pairs [{value,label}] — shows qty in label
function FSQ(val,fn,opts,placeholder){return h("select",{value:val,onChange:e=>fn(e.target.value),style:{height:32,fontSize:13}},h("option",{value:""},placeholder||"— select —"),...opts.map(o=>typeof o==="string"?h("option",{key:o,value:o},o):h("option",{key:o.value,value:o.value},o.label)));}

// ── Inline-addable select — shows "+ Add new..." option that expands to an input ──
function AddSel({val,fn,opts,onAdd,placeholder,style}){
  const[adding,setAdding]=useState(false);
  const[nv,setNv]=useState("");
  const doAdd=async()=>{
    const t=nv.trim();if(!t)return;
    await onAdd(t);fn(t);setNv("");setAdding(false);
  };
  if(adding)return h("div",{style:{display:"flex",gap:4,alignItems:"center"}},
    h("input",{autoFocus:true,value:nv,onChange:e=>setNv(e.target.value),
      onKeyDown:e=>{if(e.key==="Enter")doAdd();if(e.key==="Escape"){setAdding(false);setNv("");}},
      placeholder:"Type new name…",style:{flex:1,height:32,fontSize:13,border:"2px solid var(--acc)"}}),
    h("button",{className:"btn btn-sm btn-p",onClick:doAdd},"✓"),
    h("button",{className:"btn btn-sm",onClick:()=>{setAdding(false);setNv("")}},"✕")
  );
  const allOpts=typeof opts[0]==="string"?opts.map(o=>({value:o,label:o})):opts;
  return h("select",{value:val,onChange:e=>e.target.value==="__new__"?setAdding(true):fn(e.target.value),style:{height:32,fontSize:13,...(style||{})}},
    h("option",{value:""},placeholder||"— select —"),
    allOpts.map(o=>h("option",{key:o.value,value:o.value},o.label)),
    h("option",{value:"__new__",style:{color:"var(--acc)",fontWeight:700}},"+ Add new…")
  );
}

// ── Inline add-party widget — shows below party selects ──
function AddPartyInline({firm,M,updM,onAdded,defaultType}){
  const[open,setOpen]=useState(false);
  const[name,setName]=useState("");
  const[type,setType]=useState(defaultType||"weaver");
  if(!open)return h("button",{className:"btn btn-sm",style:{marginTop:4,fontSize:11},onClick:()=>setOpen(true)},"+ Add new "+(defaultType||"party"));
  const doAdd=async()=>{
    const t=name.trim();if(!t)return;
    // Add to Masters array
    const mk=type==="sizer"?"sizers":"weavers";
    await updM(mk,[...(M[mk]||[]),t]);
    // Add to Firestore parties collection
    await dbs(firm,"parties",uid(),{name:t,type});
    onAdded(t);setName("");setOpen(false);
  };
  return h("div",{style:{display:"flex",gap:4,alignItems:"center",marginTop:4,flexWrap:"wrap"}},
    h("input",{autoFocus:true,value:name,onChange:e=>setName(e.target.value),
      onKeyDown:e=>{if(e.key==="Enter")doAdd();if(e.key==="Escape")setOpen(false);},
      placeholder:"Party name…",style:{flex:1,minWidth:120,height:30,fontSize:12,border:"2px solid var(--acc)"}}),
    h("select",{value:type,onChange:e=>setType(e.target.value),style:{height:30,fontSize:12}},
      h("option",{value:"weaver"},"Weaver"),h("option",{value:"sizer"},"Sizer")
    ),
    h("button",{className:"btn btn-sm btn-p",onClick:doAdd},"✓ Add"),
    h("button",{className:"btn btn-sm",onClick:()=>setOpen(false)},"✕")
  );
}
function TH(cols){return cols.map(c=>h("th",{key:c},c))}
function Td(child,cls=""){return h("td",{className:cls},child)}
function Em(msg){return h("div",{className:"empty"},h("div",{className:"ei"},"📋"),h("p",null,msg))}

if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
try{ReactDOM.render(h(Root),document.getElementById("r"));}catch(e){document.getElementById("r").innerHTML="<div style='padding:20px;color:red'>Error: "+e.message+"</div>";}
</script>
